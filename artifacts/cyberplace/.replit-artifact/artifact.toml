kind = "web"
previewPath = "/"
title = "CyberPlace"
version = "1.0.0"
id = "artifacts/cyberplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18523

[services.development]
run = "pnpm --filter @workspace/cyberplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyberplace", "run", "build" ]
publicDir = "artifacts/cyberplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18523"
BASE_PATH = "/"
